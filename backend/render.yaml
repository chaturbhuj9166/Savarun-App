# Render blueprint for the Savarun backend.
# Secrets are marked sync:false — set their values in the Render dashboard,
# never in this file.
services:
  - type: web
    name: savarun-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

      # Absolute https origin of this service. Must match the Render URL,
      # otherwise uploaded images resolve to the wrong host.
      - key: PUBLIC_URL
        sync: false

      # Origin(s) the Flutter web build is served from.
      - key: CORS_ORIGINS
        sync: false

      # The whole service-account JSON, on one line.
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: savarun-app-b775b

      - key: AI_PROVIDER
        value: groq
      - key: GROQ_VISION_MODEL
        value: qwen/qwen3.6-27b
      - key: GROQ_API_KEY
        sync: false
